<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RISC 管理后台 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 100%;
            max-width: 420px;
        }

        .login-header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .login-header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .login-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .login-body {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder {
            color: #aaa;
        }

        .login-tabs {
            display: flex;
            margin-bottom: 25px;
            background: #f5f5f5;
            border-radius: 10px;
            padding: 4px;
        }

        .login-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .login-tab.active {
            background: white;
            color: #667eea;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 25px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .register-hint {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 14px;
            color: #666;
        }

        .register-hint a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .register-hint a:hover {
            text-decoration: underline;
        }

        .verification-code {
            display: flex;
            gap: 10px;
        }

        .verification-code input {
            flex: 1;
        }

        .verification-code button {
            padding: 14px 20px;
            background: #f5f5f5;
            color: #666;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        .verification-code button:hover {
            background: #e0e0e0;
        }

        .verification-code button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .hidden {
            display: none;
        }

        .login-footer {
            text-align: center;
            padding: 20px 30px;
            background: #f8f9fa;
            font-size: 13px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>📊 RISC 管理后台</h1>
            <p>请登录以访问管理功能</p>
        </div>

        <div class="login-body">
            <div class="error-message" id="errorMessage"></div>

            <div class="login-tabs">
                <div class="login-tab active" onclick="switchTab('email')" id="tabEmail">邮箱登录</div>
                <div class="login-tab" onclick="switchTab('phone')" id="tabPhone">手机登录</div>
            </div>

            <!-- 邮箱登录表单 -->
            <form id="emailForm" onsubmit="handleEmailLogin(event)">
                <div class="form-group">
                    <label>邮箱地址</label>
                    <input type="email" id="email" placeholder="请输入邮箱地址" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="emailPassword" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="login-btn">登 录</button>
            </form>

            <!-- 手机登录表单 -->
            <form id="phoneForm" class="hidden" onsubmit="handlePhoneLogin(event)">
                <div class="form-group">
                    <label>手机号码</label>
                    <input type="tel" id="phone" placeholder="请输入手机号码" pattern="[0-9]{11}" required>
                </div>
                <div class="form-group">
                    <label>验证码</label>
                    <div class="verification-code">
                        <input type="text" id="verificationCode" placeholder="请输入验证码" pattern="[0-9]{6}" required>
                        <button type="button" id="sendCodeBtn" onclick="sendVerificationCode()">获取验证码</button>
                    </div>
                </div>
                <button type="submit" class="login-btn">登 录</button>
            </form>

            <div class="back-link">
                <a href="runner-heart-risk-assessment.html">← 返回评估页面</a>
            </div>

            <div class="register-hint">
                还没有账号？<a href="#" onclick="showRegisterInfo()">联系管理员注册</a>
            </div>
        </div>

        <div class="login-footer">
            创建者：林深似海 | RISC 跑者心脏风险评估系统
        </div>
    </div>

    <script>
        // 预设的管理员账号（实际应用中应该从服务器验证）
        const adminAccounts = {
            // 邮箱登录账号
            email: [
                { email: '317884269@qq.com', password: 'cili--73', name: '林深似海' }
            ],
            // 手机登录账号（验证码固定为123456用于演示）
            phone: [
                { phone: '13857892009', name: '林深似海' }
            ]
        };

        // 切换登录方式
        function switchTab(type) {
            document.getElementById('tabEmail').classList.toggle('active', type === 'email');
            document.getElementById('tabPhone').classList.toggle('active', type === 'phone');
            document.getElementById('emailForm').classList.toggle('hidden', type !== 'email');
            document.getElementById('phoneForm').classList.toggle('hidden', type !== 'phone');
            hideError();
        }

        // 显示错误信息
        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('show');
        }

        // 隐藏错误信息
        function hideError() {
            document.getElementById('errorMessage').classList.remove('show');
        }

        // 邮箱登录
        function handleEmailLogin(event) {
            event.preventDefault();
            hideError();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('emailPassword').value;

            // 查找匹配的账号
            const account = adminAccounts.email.find(acc => 
                acc.email === email && acc.password === password
            );

            if (account) {
                // 登录成功
                const loginData = {
                    loggedIn: true,
                    loginType: 'email',
                    email: account.email,
                    name: account.name,
                    loginTime: new Date().toISOString()
                };
                localStorage.setItem('risc_admin_auth', JSON.stringify(loginData));
                
                // 跳转到管理后台
                window.location.href = 'admin.html';
            } else {
                showError('邮箱或密码错误，请重试');
            }
        }

        // 手机登录
        function handlePhoneLogin(event) {
            event.preventDefault();
            hideError();

            const phone = document.getElementById('phone').value.trim();
            const code = document.getElementById('verificationCode').value.trim();

            // 验证手机号
            const account = adminAccounts.phone.find(acc => acc.phone === phone);
            
            if (!account) {
                showError('该手机号未注册');
                return;
            }

            // 验证验证码（演示用固定验证码）
            if (code !== '123456') {
                showError('验证码错误');
                return;
            }

            // 登录成功
            const loginData = {
                loggedIn: true,
                loginType: 'phone',
                phone: account.phone,
                name: account.name,
                loginTime: new Date().toISOString()
            };
            localStorage.setItem('risc_admin_auth', JSON.stringify(loginData));
            
            // 跳转到管理后台
            window.location.href = 'admin.html';
        }

        // 发送验证码
        let countdown = 0;
        function sendVerificationCode() {
            const phone = document.getElementById('phone').value.trim();
            
            if (!phone || phone.length !== 11) {
                showError('请输入正确的手机号码');
                return;
            }

            // 检查手机号是否已注册
            const account = adminAccounts.phone.find(acc => acc.phone === phone);
            if (!account) {
                showError('该手机号未注册');
                return;
            }

            // 模拟发送验证码
            const btn = document.getElementById('sendCodeBtn');
            countdown = 60;
            btn.disabled = true;
            
            const timer = setInterval(() => {
                countdown--;
                if (countdown > 0) {
                    btn.textContent = countdown + '秒后重发';
                } else {
                    btn.textContent = '获取验证码';
                    btn.disabled = false;
                    clearInterval(timer);
                }
            }, 1000);

            // 演示提示
            alert('验证码已发送（演示验证码：123456）');
        }

        // 显示注册信息
        function showRegisterInfo() {
            alert('请联系系统管理员注册账号\n\n邮箱：317884269@qq.com\n手机：13857892009');
        }

        // 检查是否已登录
        window.onload = function() {
            const auth = JSON.parse(localStorage.getItem('risc_admin_auth') || '{}');
            if (auth.loggedIn) {
                window.location.href = 'admin.html';
            }
        };
    </script>
</body>
</html>
