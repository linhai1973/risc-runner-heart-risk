<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试标签页</title>
    <style>
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { padding: 10px 20px; cursor: pointer; border: 1px solid #ccc; background: #f5f5f5; }
        .tab.active { background: #667eea; color: white; }
        .tab-content { display: none; padding: 20px; border: 1px solid #ccc; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
    <h1>标签页测试 v1.0</h1>
    
    <div class="tabs">
        <button class="tab active" onclick="switchTab('tab1')">标签1</button>
        <button class="tab" onclick="switchTab('tab2')">标签2</button>
        <button class="tab" onclick="switchTab('tab3')">标签3</button>
    </div>
    
    <div class="tab-content active" id="tab-tab1">
        <h2>标签1内容</h2>
        <p>这是标签1的内容</p>
    </div>
    
    <div class="tab-content" id="tab-tab2">
        <h2>标签2内容</h2>
        <p>这是标签2的内容</p>
    </div>
    
    <div class="tab-content" id="tab-tab3">
        <h2>标签3内容</h2>
        <p>这是标签3的内容</p>
    </div>
    
    <script>
        function switchTab(tabId) {
            alert('点击了: ' + tabId);
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector('.tab[onclick="switchTab(\'' + tabId + '\')"]').classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active');
        }
    </script>
</body>
</html>
